version: 2

project_name: gh-dashboard

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gh-dashboard
    main: .
    binary: gh-dashboard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: gh-dashboard
    ids:
      - gh-dashboard
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md
      - config.example.toml

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
